spring.application.name=moviex
spring.thymeleaf.cache=false
server.port=8080
# Kết nối MongoDB ngoài (mặc định localhost:27017/moviex). Override bằng env MONGODB_URI nếu cần.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/moviex}
spring.mongodb.embedded.version=7.0.5
spring.mongodb.embedded.port=27017
de.flapdoodle.mongodb.embedded.version=7.0.5
spring.data.mongodb.database=moviex
