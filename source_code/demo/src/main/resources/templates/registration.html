<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/stylesheet/login.css}">
    <link rel="icon" th:href="@{/assets/popcorn.png}">
</head>
<body>
<div class="container">
    <div class="login-container">
        <div class="login-info-container">
            <h1 class="title">MOVIEX</h1>
            <p>Create your account</p>
            <form class="inputs-container" th:action="@{/register}" method="post" th:object="${registerForm}">
                <input class="input" type="email" th:field="*{email}" placeholder="Email"/>
                <input class="input" type="text" th:field="*{username}" placeholder="Username"/>
                <input class="input" type="password" th:field="*{password}" placeholder="Password"/>
                <select class="input" th:field="*{subscription}">
                    <option value="">Subscription plan</option>
                    <option value="BASIC">Basic</option>
                    <option value="STANDARD">Standard</option>
                    <option value="PREMIUM">Premium</option>
                </select>
                <button class="btn" type="submit">Register</button>
                <p class="error" th:if="${registerError}" th:text="${registerError}"></p>
                <p class="success" th:if="${registerSuccess}" th:text="${registerSuccess}"></p>
            </form>
            <p>Already have an account? <a th:href="@{/login}">Login</a></p>
        </div>
        <img th:src="@{/assets/netflix.jpg}" alt="banner">
    </div>
</div>
</body>
</html>
